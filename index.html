<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Loan Architect</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #6366f1; --text: #f1f5f9; }
        
        body { 
            font-family: 'Segoe UI', system-ui; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 10px;
            overflow-x: hidden; /* Prevent horizontal scroll */
        }

        .container { 
            max-width: 1200px; 
            margin: auto; 
            display: grid; 
            grid-template-columns: 350px 1fr; 
            gap: 20px; 
        }

        @media (max-width: 900px) { 
            .container { grid-template-columns: 1fr; } 
        }

        .panel { 
            background: var(--panel); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }

        label { display: block; font-size: 0.8rem; margin-top: 10px; color: #94a3b8; }
        input { 
            width: 100%; padding: 10px; margin-top: 5px; 
            background: #0f172a; border: 1px solid #334155; 
            color: white; border-radius: 6px; box-sizing: border-box; 
        }

        .btn { width: 100%; padding: 12px; border: none; color: white; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-calc { background: var(--accent); }
        .btn-pdf { background: #ef4444; }
        .btn-csv { background: #10b981; }

        .big-val { font-size: 1.5rem; color: #22c55e; font-weight: bold; }
        
        /* Mobile-friendly table overflow */
        .table-wrap { 
            width: 100%;
            overflow-x: auto; 
            margin-top: 20px; 
            max-height: 500px; 
            border: 1px solid #334155; 
            -webkit-overflow-scrolling: touch;
        }
        
        table { width: 100%; min-width: 500px; border-collapse: collapse; color: white; font-size: 0.8rem; }
        th { background: #334155; padding: 10px; position: sticky; top: 0; z-index: 10; text-align: right; }
        td { padding: 8px; border-bottom: 1px solid #334155; text-align: right; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2>Loan Architect</h2>
        <label>Home Price ($)</label><input type="number" id="price" value="300000" min="0">
        <label>Down Payment ($)</label><input type="number" id="down" value="60000" min="0">
        <label>Start Date</label><input type="date" id="startDate">
        <label>Monthly Income ($)</label><input type="number" id="income" value="5000" min="0">
        <label>Interest Rate (%)</label><input type="number" id="rate" value="6.5" min="0" step="0.01">
        <label>Term (Years)</label><input type="number" id="years" value="30" min="1">
        <label>Extra Monthly Payment ($)</label><input type="number" id="extra" value="0" min="0">
        <button class="btn btn-calc" onclick="compute()">Analyze Loan</button>
        <button class="btn btn-pdf" onclick="generatePDF()">Download PDF Report</button>
        <button class="btn btn-csv" onclick="downloadCSV()">Download Full CSV</button>
    </div>

    <div class="panel">
        <h2>Dashboard</h2>
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div><small>Monthly Payment</small><div id="monthlyDisplay" class="big-val">$0.00</div></div>
            <div><small>Affordability</small><div id="affordDisplay" class="big-val" style="font-size:1.1rem;">--</div></div>
        </div>
        <canvas id="loanChart" style="max-height: 250px;"></canvas>
        <div class="table-wrap">
            <table id="scheduleTable">
                <thead><tr><th>Date</th><th>Month</th><th>Payment</th><th>Interest</th><th>Principal</th><th>Balance</th></tr></thead>
                <tbody id="scheduleBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    document.getElementById('startDate').valueAsDate = new Date();
    let fullSchedule = [];

    function compute() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const down = parseFloat(document.getElementById('down').value) || 0;
        const income = parseFloat(document.getElementById('income').value) || 0;
        const rateInput = parseFloat(document.getElementById('rate').value) || 0;
        const years = parseFloat(document.getElementById('years').value) || 0;
        const extra = parseFloat(document.getElementById('extra').value) || 0;
        const startDate = new Date(document.getElementById('startDate').value);

        if (price <= down || years <= 0) {
            alert("Please check your Home Price, Down Payment, and Term values.");
            return;
        }

        const rate = rateInput / 100 / 12;
        const n = years * 12;
        const P = price - down;
        const M = rate === 0 ? P / n : (P * rate * Math.pow(1 + rate, n)) / (Math.pow(1 + rate, n) - 1);
        const totalMonthlyPayment = M + extra;
        
        document.getElementById('monthlyDisplay').innerText = `$${totalMonthlyPayment.toFixed(2)}`;
        const ratio = (totalMonthlyPayment / income) * 100;
        document.getElementById('affordDisplay').innerText = income > 0 ? (ratio <= 28 ? `Healthy (${ratio.toFixed(1)}%)` : `High Risk (${ratio.toFixed(1)}%)`) : "N/A";
        document.getElementById('affordDisplay').style.color = ratio <= 28 ? '#22c55e' : '#ef4444';

        let bal = P;
        fullSchedule = [];
        let htmlRows = '';
        
        for(let i=1; i<=n; i++) {
            let interest = bal * rate;
            let principal = M - interest + extra;
            if (bal < principal) { principal = bal; bal = 0; } else { bal -= principal; }
            
            let paymentDate = new Date(startDate);
            paymentDate.setMonth(paymentDate.getMonth() + i - 1);
            let dateStr = paymentDate.toLocaleDateString();
            
            fullSchedule.push([dateStr, i, totalMonthlyPayment.toFixed(2), interest.toFixed(2), principal.toFixed(2), bal.toFixed(2)]);
            htmlRows += `<tr><td>${dateStr}</td><td>${i}</td><td>$${totalMonthlyPayment.toFixed(2)}</td><td>$${interest.toFixed(2)}</td><td>$${principal.toFixed(2)}</td><td>$${bal.toFixed(2)}</td></tr>`;
            if (bal <= 0) break;
        }
        document.getElementById('scheduleBody').innerHTML = htmlRows;
        drawChart(P, totalMonthlyPayment, rate, n);
    }

    function drawChart(P, M, r, n) {
        const ctx = document.getElementById('loanChart').getContext('2d');
        let data = [], bal = P;
        for(let i=0; i<=n; i++) {
            data.push(bal.toFixed(0));
            let interest = bal * r;
            bal -= (M - interest);
            if(bal < 0) bal = 0;
        }
        if(window.myChart) window.myChart.destroy();
        window.myChart = new Chart(ctx, { type: 'line', data: { labels: Array.from({length: data.length}, (_,i) => i), datasets: [{ label: 'Balance', data: data, borderColor: '#6366f1' }] }, options: { maintainAspectRatio: false } });
    }

    function generatePDF() {
        if(fullSchedule.length === 0) return alert("Run analysis first!");
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("Amortization Schedule", 14, 22);
        doc.autoTable({ startY: 30, head: [['Date', 'Month', 'Payment', 'Interest', 'Principal', 'Balance']], body: fullSchedule });
        doc.save('loan_report.pdf');
    }

    function downloadCSV() {
        if(fullSchedule.length === 0) return alert("Run analysis first!");
        let csv = "Date,Month,Payment,Interest,Principal,Balance\n" + fullSchedule.map(row => row.join(",")).join("\n");
        const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
        const a = document.createElement("a");
        a.href = url; a.download = "schedule.csv"; a.click();
    }
</script>
</body>
</html>
